name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GCP_PROJECT_ID: vision-sys
  FIREBASE_PROJECT_ID: vision-sys
  CLOUD_RUN_SERVICE: deplyzegpt-api
  CLOUD_RUN_REGION: europe-west1
  ARTIFACT_REGISTRY_REPO: deplyzegpt

jobs:
  backend:
    name: Backend Quality
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install backend quality tools
        run: python -m pip install --upgrade pip ruff

      - name: Compile backend modules
        run: python -m compileall -q backend

      - name: Check backend for syntax-level Python errors
        run: ruff check backend --select E9,F63,F7,F82

  frontend:
    name: Frontend Build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Audit critical frontend vulnerabilities
        run: npm audit --audit-level=critical

      - name: Build frontend
        env:
          CI: true
          REACT_APP_BACKEND_URL: http://127.0.0.1:8000
        run: npm run build

  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint GitHub Actions workflows
        uses: raven-actions/actionlint@v2

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan repository for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-backend:
    name: Deploy Backend to Cloud Run
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    needs:
      - backend
      - frontend
      - workflow-lint
      - secret-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      cloud_run_url: ${{ steps.deploy.outputs.cloud_run_url }}
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate production deployment inputs
        env:
          GCP_DEPLOYER_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT_JSON }}
          FIREBASE_ADMIN_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_ADMIN_SERVICE_ACCOUNT_JSON }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
        run: |
          set -euo pipefail

          test "$GCP_PROJECT_ID" = "vision-sys"
          test "$FIREBASE_PROJECT_ID" = "vision-sys"

          blocked_project="deplyze-""quant"
          if grep -R "$blocked_project" .github/workflows firebase.json .firebaserc; then
            echo "Deployment configuration contains a blocked project reference." >&2
            exit 1
          fi

          missing=()
          for name in \
            GCP_DEPLOYER_SERVICE_ACCOUNT_JSON \
            FIREBASE_ADMIN_SERVICE_ACCOUNT_JSON \
            R2_BUCKET_NAME \
            R2_ENDPOINT_URL \
            R2_ACCESS_KEY_ID \
            R2_SECRET_ACCESS_KEY \
            GEMINI_API_KEY \
            GEMINI_MODEL
          do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required GitHub secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT_JSON }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Assert Google Cloud project
        run: |
          set -euo pipefail
          gcloud config set project "$GCP_PROJECT_ID"
          active_project="$(gcloud config get-value project)"

          if [ "$active_project" != "vision-sys" ]; then
            echo "Refusing to deploy outside vision-sys." >&2
            exit 1
          fi

      - name: Create Artifact Registry repository if needed
        run: |
          set -euo pipefail
          if ! gcloud artifacts repositories describe "$ARTIFACT_REGISTRY_REPO" \
            --project="$GCP_PROJECT_ID" \
            --location="$CLOUD_RUN_REGION" >/dev/null 2>&1; then
            gcloud artifacts repositories create "$ARTIFACT_REGISTRY_REPO" \
              --project="$GCP_PROJECT_ID" \
              --location="$CLOUD_RUN_REGION" \
              --repository-format=docker \
              --description="DeplyzeGPT production Docker images" \
              --quiet
          fi

      - name: Configure Docker for Artifact Registry
        run: |
          set -euo pipefail
          gcloud auth configure-docker "${CLOUD_RUN_REGION}-docker.pkg.dev" --quiet

      - name: Write Cloud Run environment file
        env:
          FIREBASE_ADMIN_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_ADMIN_SERVICE_ACCOUNT_JSON }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64
          import json
          import os
          from pathlib import Path

          env = {
              "FIREBASE_SERVICE_ACCOUNT_JSON_B64": base64.b64encode(
                  os.environ["FIREBASE_ADMIN_SERVICE_ACCOUNT_JSON"].encode("utf-8")
              ).decode("ascii"),
              "R2_BUCKET_NAME": os.environ["R2_BUCKET_NAME"],
              "R2_ENDPOINT_URL": os.environ["R2_ENDPOINT_URL"],
              "R2_ACCESS_KEY_ID": os.environ["R2_ACCESS_KEY_ID"],
              "R2_SECRET_ACCESS_KEY": os.environ["R2_SECRET_ACCESS_KEY"],
              "GEMINI_API_KEY": os.environ["GEMINI_API_KEY"],
              "GEMINI_MODEL": os.environ["GEMINI_MODEL"],
              "FIREBASE_PROJECT_ID": "vision-sys",
              "GOOGLE_CLOUD_PROJECT": "vision-sys",
              "GCLOUD_PROJECT": "vision-sys",
              "CORS_ORIGINS": "https://vision-sys.web.app,https://vision-sys.firebaseapp.com,https://deplyzegpt.xyz",
          }

          Path("cloud-run-env.yaml").write_text(
              "".join(f"{key}: {json.dumps(value)}\n" for key, value in env.items()),
              encoding="utf-8",
          )
          PY

      - name: Compute image URL
        id: image
        run: |
          set -euo pipefail
          image="${CLOUD_RUN_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REGISTRY_REPO}/${CLOUD_RUN_SERVICE}:${GITHUB_SHA}"
          echo "image=$image" >> "$GITHUB_OUTPUT"

      - name: Build backend image
        run: |
          set -euo pipefail
          docker build \
            --file backend/Dockerfile \
            --tag "${{ steps.image.outputs.image }}" \
            backend

      - name: Push backend image
        run: |
          set -euo pipefail
          docker push "${{ steps.image.outputs.image }}"

      - name: Deploy Cloud Run service
        id: deploy
        run: |
          set -euo pipefail

          gcloud run deploy "$CLOUD_RUN_SERVICE" \
            --project="$GCP_PROJECT_ID" \
            --region="$CLOUD_RUN_REGION" \
            --platform=managed \
            --image="${{ steps.image.outputs.image }}" \
            --allow-unauthenticated \
            --execution-environment=gen2 \
            --cpu=2 \
            --memory=4Gi \
            --concurrency=1 \
            --timeout=3600s \
            --min-instances=1 \
            --max-instances=3 \
            --no-cpu-throttling \
            --cpu-boost \
            --env-vars-file=cloud-run-env.yaml \
            --quiet

          cloud_run_url="$(gcloud run services describe "$CLOUD_RUN_SERVICE" \
            --project="$GCP_PROJECT_ID" \
            --region="$CLOUD_RUN_REGION" \
            --format="value(status.url)")"

          echo "cloud_run_url=$cloud_run_url" >> "$GITHUB_OUTPUT"

      - name: Smoke test Cloud Run health
        run: |
          set -euo pipefail
          curl --fail --silent --show-error "${{ steps.deploy.outputs.cloud_run_url }}/api/healthz"

  deploy-frontend:
    name: Deploy Frontend to Firebase Hosting
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs:
      - deploy-backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate frontend deployment inputs
        env:
          GCP_DEPLOYER_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT_JSON }}
          REACT_APP_FIREBASE_API_KEY: ${{ secrets.REACT_APP_FIREBASE_API_KEY }}
          REACT_APP_FIREBASE_AUTH_DOMAIN: ${{ secrets.REACT_APP_FIREBASE_AUTH_DOMAIN }}
          REACT_APP_FIREBASE_PROJECT_ID: ${{ secrets.REACT_APP_FIREBASE_PROJECT_ID }}
          REACT_APP_FIREBASE_STORAGE_BUCKET: ${{ secrets.REACT_APP_FIREBASE_STORAGE_BUCKET }}
          REACT_APP_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.REACT_APP_FIREBASE_MESSAGING_SENDER_ID }}
          REACT_APP_FIREBASE_APP_ID: ${{ secrets.REACT_APP_FIREBASE_APP_ID }}
          REACT_APP_FIREBASE_MEASUREMENT_ID: ${{ secrets.REACT_APP_FIREBASE_MEASUREMENT_ID }}
        run: |
          set -euo pipefail

          test "$GCP_PROJECT_ID" = "vision-sys"
          test "$FIREBASE_PROJECT_ID" = "vision-sys"
          test "$REACT_APP_FIREBASE_PROJECT_ID" = "vision-sys"

          blocked_project="deplyze-""quant"
          if grep -R "$blocked_project" .github/workflows firebase.json .firebaserc; then
            echo "Deployment configuration contains a blocked project reference." >&2
            exit 1
          fi

          missing=()
          for name in \
            GCP_DEPLOYER_SERVICE_ACCOUNT_JSON \
            REACT_APP_FIREBASE_API_KEY \
            REACT_APP_FIREBASE_AUTH_DOMAIN \
            REACT_APP_FIREBASE_PROJECT_ID \
            REACT_APP_FIREBASE_STORAGE_BUCKET \
            REACT_APP_FIREBASE_MESSAGING_SENDER_ID \
            REACT_APP_FIREBASE_APP_ID \
            REACT_APP_FIREBASE_MEASUREMENT_ID
          do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required GitHub secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT_JSON }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build production frontend
        working-directory: frontend
        env:
          CI: true
          REACT_APP_FIREBASE_API_KEY: ${{ secrets.REACT_APP_FIREBASE_API_KEY }}
          REACT_APP_FIREBASE_AUTH_DOMAIN: ${{ secrets.REACT_APP_FIREBASE_AUTH_DOMAIN }}
          REACT_APP_FIREBASE_PROJECT_ID: ${{ secrets.REACT_APP_FIREBASE_PROJECT_ID }}
          REACT_APP_FIREBASE_STORAGE_BUCKET: ${{ secrets.REACT_APP_FIREBASE_STORAGE_BUCKET }}
          REACT_APP_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.REACT_APP_FIREBASE_MESSAGING_SENDER_ID }}
          REACT_APP_FIREBASE_APP_ID: ${{ secrets.REACT_APP_FIREBASE_APP_ID }}
          REACT_APP_FIREBASE_MEASUREMENT_ID: ${{ secrets.REACT_APP_FIREBASE_MEASUREMENT_ID }}
          REACT_APP_BACKEND_URL: https://deplyzegpt-api-eespme2hdq-ew.a.run.app
        run: npm run build

      - name: Deploy Firebase Hosting
        run: |
          set -euo pipefail
          npx firebase-tools@latest deploy \
            --only hosting \
            --project "$FIREBASE_PROJECT_ID" \
            --non-interactive

      - name: Report deployment URLs
        run: |
          set -euo pipefail
          echo "Firebase Hosting URL: https://vision-sys.web.app"
          echo "Cloud Run URL: ${{ needs.deploy-backend.outputs.cloud_run_url }}"
          echo "Artifact Registry image: ${{ needs.deploy-backend.outputs.image }}"
